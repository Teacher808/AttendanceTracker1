<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EduTrack Responsive Portal</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbwvW89RSQo3jz73CZosXiqGHU0QVBeTEH9VyABkZuRlHecJ7X6sTr5m18F0VGgQkZN9/exec"; 

    const apiCall = async (action, payload = {}) => {
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...payload })
        });
        return await response.json();
      } catch (error) {
        return { success: false, message: "Network error. Make sure your GAS URL is correct." };
      }
    };

    const Icons = {
      Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
      Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
      Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
      LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
      ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>,
      Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
      ChartBar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>,
      Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
      Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    };

    // --- Toast Notification System ---
    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      
      const bg = type === 'error' ? 'bg-red-600' : 'bg-emerald-600';
      return (
        <div className={`fixed bottom-4 right-4 ${bg} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50 animate-bounce`}>
          <span className="font-semibold">{message}</span>
          <button onClick={onClose} className="text-white/80 hover:text-white">&times;</button>
        </div>
      );
    };

    // --- Authentication Screen ---
    const AuthScreen = ({ onLogin, showToast }) => {
      const [isLogin, setIsLogin] = useState(true);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);

        const action = isLogin ? 'login' : 'register';
        const result = await apiCall(action, { username, password });

        if (result.success) {
          onLogin({ id: result.userId, username: result.username });
        } else {
          showToast(result.message, 'error');
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
            <div className="text-center mb-8">
              <h1 className="text-3xl font-extrabold text-blue-600 mb-2">EduTrack</h1>
              <p className="text-slate-500 font-medium">{isLogin ? 'Welcome back! Please login.' : 'Create an account.'}</p>
            </div>
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-1">Username</label>
                <input type="text" required className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" value={username} onChange={(e) => setUsername(e.target.value)} />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-1">Password</label>
                <input type="password" required className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" value={password} onChange={(e) => setPassword(e.target.value)} />
              </div>
              <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-colors flex justify-center items-center">
                {loading ? <div className="loader border-t-white mr-2"></div> : null}
                {isLogin ? 'Login' : 'Create Account'}
              </button>
            </form>
            <div className="mt-6 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-slate-500 hover:text-blue-600 font-medium text-sm transition-colors">
                {isLogin ? "Don't have an account? Register here" : "Already have an account? Login here"}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- Modals ---
    const ModalBase = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
            <div className="p-6 border-b border-slate-100 flex justify-between items-center shrink-0">
              <h2 className="text-xl font-bold text-slate-800">{title}</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
            </div>
            <div className="p-6 overflow-y-auto custom-scrollbar">
              {children}
            </div>
          </div>
        </div>
      );
    };

    const AddClassModal = ({ isOpen, onClose, onAdd }) => {
      const [formData, setFormData] = useState({ gradeLevel: 'Grade 7', sectionName: '', role: 'adviser', subject: '' });
      const handleSubmit = (e) => { e.preventDefault(); onAdd(formData); setFormData({ gradeLevel: 'Grade 7', sectionName: '', role: 'adviser', subject: '' }); };
      return (
        <ModalBase isOpen={isOpen} onClose={onClose} title="Add New Class">
          <form onSubmit={handleSubmit} className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <div><label className="block text-sm font-semibold mb-1">Grade Level</label><select className="w-full p-2.5 border rounded-lg outline-none" value={formData.gradeLevel} onChange={e => setFormData({...formData, gradeLevel: e.target.value})}>{['Grade 7', 'Grade 8', 'Grade 9', 'Grade 10', 'Grade 11', 'Grade 12'].map(g => <option key={g} value={g}>{g}</option>)}</select></div>
              <div><label className="block text-sm font-semibold mb-1">Section</label><input required className="w-full p-2.5 border rounded-lg outline-none" value={formData.sectionName} onChange={e => setFormData({...formData, sectionName: e.target.value})} /></div>
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1">Your Role</label>
              <div className="flex gap-4">
                <label className="flex items-center gap-2"><input type="radio" name="role" value="adviser" checked={formData.role === 'adviser'} onChange={e => setFormData({...formData, role: e.target.value, subject: ''})} /> Advisory</label>
                <label className="flex items-center gap-2"><input type="radio" name="role" value="subject" checked={formData.role === 'subject'} onChange={e => setFormData({...formData, role: e.target.value})} /> Subject Teacher</label>
              </div>
            </div>
            {formData.role === 'subject' && <div><label className="block text-sm font-semibold mb-1">Subject</label><input required className="w-full p-2.5 border rounded-lg outline-none" value={formData.subject} onChange={e => setFormData({...formData, subject: e.target.value})} /></div>}
            <div className="pt-4 flex gap-3"><button type="button" onClick={onClose} className="flex-1 py-2.5 border text-slate-600 rounded-lg font-semibold">Cancel</button><button type="submit" className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-semibold shadow-md">Add Class</button></div>
          </form>
        </ModalBase>
      );
    };

    const AddStudentModal = ({ isOpen, onClose, onAdd }) => {
      const [formData, setFormData] = useState({ firstName: '', lastName: '', gender: 'Male', lrn: '' });
      const handleSubmit = (e) => { e.preventDefault(); onAdd(formData); setFormData({ firstName: '', lastName: '', gender: 'Male', lrn: '' }); };
      return (
        <ModalBase isOpen={isOpen} onClose={onClose} title="Enroll Single Student">
          <form onSubmit={handleSubmit} className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <div><label className="block text-sm font-semibold mb-1">First Name</label><input required className="w-full p-2.5 border rounded-lg outline-none" value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} /></div>
              <div><label className="block text-sm font-semibold mb-1">Last Name</label><input required className="w-full p-2.5 border rounded-lg outline-none" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} /></div>
            </div>
            <div><label className="block text-sm font-semibold mb-1">LRN (Optional)</label><input className="w-full p-2.5 border rounded-lg outline-none" value={formData.lrn} onChange={e => setFormData({...formData, lrn: e.target.value})} /></div>
            <div><label className="block text-sm font-semibold mb-1">Gender</label><select className="w-full p-2.5 border rounded-lg outline-none" value={formData.gender} onChange={e => setFormData({...formData, gender: e.target.value})}><option value="Male">Male</option><option value="Female">Female</option></select></div>
            <div className="pt-4 flex gap-3"><button type="button" onClick={onClose} className="flex-1 py-2.5 border text-slate-600 rounded-lg font-semibold">Cancel</button><button type="submit" className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-semibold shadow-md">Enroll</button></div>
          </form>
        </ModalBase>
      );
    };

    const BulkEnrollModal = ({ isOpen, onClose, onAddBulk }) => {
      const [textData, setTextData] = useState("");
      const handleSubmit = (e) => {
        e.preventDefault();
        const lines = textData.split('\n').filter(l => l.trim() !== '');
        const students = lines.map(line => {
          const parts = line.split(',').map(p => p.trim());
          return { firstName: parts[0] || 'Unknown', lastName: parts[1] || 'Unknown', gender: ['Male','Female'].includes(parts[2]) ? parts[2] : 'Male', lrn: parts[3] || '' };
        });
        onAddBulk(students);
        setTextData("");
      };
      return (
        <ModalBase isOpen={isOpen} onClose={onClose} title="Bulk Enroll Students">
          <form onSubmit={handleSubmit} className="space-y-4">
            <p className="text-sm text-slate-500">Paste student data separated by commas: <b>FirstName, LastName, Gender, LRN</b> (one student per line).</p>
            <textarea required rows="6" className="w-full p-3 border rounded-lg outline-none font-mono text-sm" placeholder="Juan, Dela Cruz, Male, 123456789012&#10;Maria, Clara, Female, 987654321098" value={textData} onChange={e => setTextData(e.target.value)}></textarea>
            <div className="pt-2 flex gap-3"><button type="button" onClick={onClose} className="flex-1 py-2.5 border text-slate-600 rounded-lg font-semibold">Cancel</button><button type="submit" className="flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-semibold shadow-md">Import</button></div>
          </form>
        </ModalBase>
      );
    };

    const ImportClassModal = ({ isOpen, onClose, onImport, showToast }) => {
      const [classes, setClasses] = useState([]);
      const [loading, setLoading] = useState(false);
      
      useEffect(() => {
        if (isOpen) {
          setLoading(true);
          apiCall('getAllClassesInfo').then(res => {
            if(res.success) setClasses(res.data);
            else showToast("Failed to fetch classes", "error");
            setLoading(false);
          });
        }
      }, [isOpen]);

      const handleImport = (sourceClass) => {
        if (!sourceClass.students || sourceClass.students.length === 0) {
          showToast("This class has no students to import.", "error");
          return;
        }
        // Strip out their IDs to generate new ones for THIS class
        const cleanedStudents = sourceClass.students.map(s => ({ firstName: s.firstName, lastName: s.lastName, gender: s.gender, lrn: s.lrn }));
        onImport(cleanedStudents);
      };

      return (
        <ModalBase isOpen={isOpen} onClose={onClose} title="Import From Database">
          {loading ? <div className="flex justify-center p-8"><div className="loader"></div></div> : (
            <div className="space-y-3">
              {classes.length === 0 ? <p className="text-slate-500 text-center py-4">No classes found in the database.</p> : null}
              {classes.map(c => (
                <div key={c.id} className="p-4 border border-slate-200 rounded-xl flex justify-between items-center hover:bg-slate-50">
                  <div>
                    <h4 className="font-bold text-slate-800">{c.gradeLevel} - {c.sectionName}</h4>
                    <p className="text-xs text-slate-500">Teacher: {c.teacherName} | {c.students.length} Students</p>
                  </div>
                  <button onClick={() => handleImport(c)} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-4 py-2 rounded-lg font-semibold text-sm transition-colors">Import All</button>
                </div>
              ))}
            </div>
          )}
        </ModalBase>
      );
    };

    // --- Main Dashboard ---
    const Dashboard = ({ user, onLogout, showToast }) => {
      const [classes, setClasses] = useState([]);
      const [loading, setLoading] = useState(true);
      const [activeClassId, setActiveClassId] = useState(null);
      const [activeTab, setActiveTab] = useState('students'); // 'students', 'attendance', 'reports'
      
      // Modals state
      const [modals, setModals] = useState({ addClass: false, addStudent: false, bulkEnroll: false, importClass: false });
      const toggleModal = (key, val) => setModals(prev => ({ ...prev, [key]: val }));

      // Attendance state
      const getToday = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
      const [attDate, setAttDate] = useState(getToday());
      const [attMap, setAttMap] = useState({}); // Local edits before saving
      
      // Report state
      const [reportMonth, setReportMonth] = useState(getToday().substring(0, 7));

      useEffect(() => { fetchClasses(); }, []);

      const fetchClasses = async () => {
        setLoading(true);
        const result = await apiCall('getClasses', { userId: user.id });
        if (result.success) setClasses(result.data);
        else showToast("Error fetching classes: " + result.message, "error");
        setLoading(false);
      };

      const handleAddClass = async (cls) => {
        const tempClass = { ...cls, id: 'temp-' + Date.now(), students: [], attendance: {} };
        setClasses([...classes, tempClass]);
        toggleModal('addClass', false);
        const result = await apiCall('addClass', { userId: user.id, cls });
        if (!result.success) { showToast("Failed to save class", "error"); fetchClasses(); } 
        else setClasses(prev => prev.map(c => c.id === tempClass.id ? { ...c, id: result.classId } : c));
      };

      const updateLocalClassStudents = (newStudentsArr, actionName) => {
        setClasses(prev => prev.map(c => {
          if (c.id === activeClassId) return { ...c, students: [...(c.students || []), ...newStudentsArr] };
          return c;
        }));
      };

      const handleAddStudent = async (studentData) => {
        const tempStudent = { ...studentData, id: 'temp-' + Date.now() };
        updateLocalClassStudents([tempStudent]);
        toggleModal('addStudent', false);
        const result = await apiCall('enrollStudent', { classId: activeClassId, student: studentData });
        if (result.success) {
           showToast("Student enrolled!", "success");
           setClasses(prev => prev.map(c => c.id === activeClassId ? { ...c, students: c.students.map(s => s.id === tempStudent.id ? result.student : s) } : c));
        } else { showToast("Failed to enroll", "error"); fetchClasses(); }
      };

      const handleBulkEnroll = async (studentsArr) => {
        const tempStudents = studentsArr.map((s,i) => ({...s, id: 'temp-bulk-'+i}));
        updateLocalClassStudents(tempStudents);
        toggleModal('bulkEnroll', false);
        toggleModal('importClass', false);
        showToast("Saving bulk students...", "success");
        const result = await apiCall('bulkEnroll', { classId: activeClassId, students: studentsArr });
        if (result.success) {
           showToast(`Successfully enrolled ${studentsArr.length} students!`, "success");
           setClasses(prev => prev.map(c => c.id === activeClassId ? { ...c, students: [...c.students.filter(s => !s.id.startsWith('temp-bulk-')), ...result.newStudents] } : c));
        } else { showToast("Bulk import failed", "error"); fetchClasses(); }
      };

      const activeClass = classes.find(c => c.id === activeClassId);

      // --- Attendance Logic ---
      useEffect(() => {
        if (activeTab === 'attendance' && activeClass) {
          // Initialize attMap with saved data or default to Present 'P'
          const savedAtt = (activeClass.attendance || {})[attDate];
          const initialMap = {};
          (activeClass.students || []).forEach(s => { initialMap[s.id] = savedAtt ? savedAtt[s.id] || 'P' : 'P'; });
          setAttMap(initialMap);
        }
      }, [activeTab, activeClass, attDate]);

      const handleSaveAttendance = async () => {
        // Optimistic UI update
        const originalAtt = activeClass.attendance || {};
        const updatedAtt = { ...originalAtt, [attDate]: attMap };
        setClasses(prev => prev.map(c => c.id === activeClassId ? { ...c, attendance: updatedAtt } : c));
        showToast("Saving attendance...", "success");

        const result = await apiCall('saveAttendance', { classId: activeClassId, date: attDate, records: attMap });
        if (result.success) showToast("Attendance saved!", "success");
        else { showToast("Failed to save attendance", "error"); fetchClasses(); }
      };

      // --- Report Analytics Calculations ---
      const reportStats = useMemo(() => {
        if (!activeClass || !activeClass.attendance || !activeClass.students) return null;
        const students = activeClass.students;
        
        // Find all recorded dates in selected month
        const monthDates = Object.keys(activeClass.attendance).filter(d => d.startsWith(reportMonth)).sort();
        const totalDays = monthDates.length;
        if (totalDays === 0) return { totalDays: 0, overall: 0, male: 0, female: 0, dates: [], statsByStudent: {} };

        let totalP = 0, maleP = 0, femaleP = 0;
        let totalPossible = students.length * totalDays;
        let maleTotal = students.filter(s => s.gender === 'Male').length * totalDays;
        let femaleTotal = students.filter(s => s.gender === 'Female').length * totalDays;

        const statsByStudent = {};
        students.forEach(s => {
          let pCount = 0, aCount = 0;
          monthDates.forEach(d => {
            const status = activeClass.attendance[d][s.id] || 'A'; // count unknown as absent
            if (status === 'P') { pCount++; totalP++; if (s.gender === 'Male') maleP++; else femaleP++; }
            else if (status === 'A') aCount++;
          });
          statsByStudent[s.id] = { present: pCount, absent: aCount, percent: Math.round((pCount/totalDays)*100) };
        });

        return {
          totalDays,
          dates: monthDates,
          overall: totalPossible ? Math.round((totalP / totalPossible) * 100) : 0,
          male: maleTotal ? Math.round((maleP / maleTotal) * 100) : 0,
          female: femaleTotal ? Math.round((femaleP / femaleTotal) * 100) : 0,
          statsByStudent
        };
      }, [activeClass, reportMonth]);

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-600/20">E</div>
              <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight">EduTrack</h1>
            </div>
            <div className="flex items-center gap-4">
              <div className="hidden md:block text-sm font-medium text-slate-500">Teacher: <span className="text-slate-800 font-bold">{user.username}</span></div>
              <button onClick={onLogout} className="flex items-center gap-2 px-4 py-2 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors font-semibold"><Icons.LogOut /> <span className="hidden sm:inline">Logout</span></button>
            </div>
          </header>

          <main className="flex-1 p-6 md:p-8 max-w-7xl w-full mx-auto">
            {activeClass ? (
              // --- CLASS DETAIL VIEW ---
              <div className="animate-fade-in">
                <button onClick={() => { setActiveClassId(null); setActiveTab('students'); }} className="flex items-center gap-2 text-slate-500 hover:text-blue-600 mb-6 font-semibold transition-colors"><Icons.ArrowLeft /> Back to Dashboard</button>
                
                <div className="mb-6">
                  <div className="flex items-center gap-3 mb-1">
                    <span className={`px-3 py-1 text-xs font-bold rounded-full ${activeClass.role === 'adviser' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700'}`}>{activeClass.role === 'adviser' ? 'Adviser' : 'Subject'}</span>
                    <h2 className="text-3xl font-bold text-slate-900">{activeClass.gradeLevel} - {activeClass.sectionName}</h2>
                  </div>
                  <p className="text-slate-500 font-medium">{activeClass.role === 'subject' ? `Subject: ${activeClass.subject}` : 'Advisory Class'}</p>
                </div>

                {/* Tabs Navigation */}
                <div className="flex border-b border-slate-200 mb-6 overflow-x-auto custom-scrollbar">
                  {[
                    { id: 'students', label: 'Students List', icon: <Icons.Users /> },
                    { id: 'attendance', label: 'Daily Attendance', icon: <Icons.Calendar /> },
                    { id: 'reports', label: 'Monthly Report', icon: <Icons.ChartBar /> }
                  ].map(tab => (
                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-6 py-3 font-semibold border-b-2 transition-colors whitespace-nowrap ${activeTab === tab.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}>
                      {tab.icon} {tab.label}
                    </button>
                  ))}
                </div>

                {/* TAB: STUDENTS */}
                {activeTab === 'students' && (
                  <div className="space-y-4">
                    <div className="flex flex-wrap gap-3 justify-end mb-4">
                       <button onClick={() => toggleModal('addStudent', true)} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-semibold flex items-center gap-2 text-sm shadow-md"><Icons.Plus /> Single Enroll</button>
                       <button onClick={() => toggleModal('bulkEnroll', true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-semibold flex items-center gap-2 text-sm shadow-md"><Icons.Upload /> Bulk List</button>
                       <button onClick={() => toggleModal('importClass', true)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl font-semibold flex items-center gap-2 text-sm shadow-md"><Icons.Download /> Import DB</button>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="overflow-x-auto custom-scrollbar">
                        <table className="w-full text-left border-collapse">
                          <thead>
                            <tr className="bg-slate-50 border-b border-slate-200">
                              <th className="p-4 font-bold text-slate-600">No.</th>
                              <th className="p-4 font-bold text-slate-600">Student Name</th>
                              <th className="p-4 font-bold text-slate-600">Gender</th>
                              <th className="p-4 font-bold text-slate-600">LRN</th>
                            </tr>
                          </thead>
                          <tbody>
                            {(!activeClass.students || activeClass.students.length === 0) ? (
                              <tr><td colSpan="4" className="p-8 text-center text-slate-500 font-medium">No students enrolled yet. Add some to get started.</td></tr>
                            ) : (
                              // Sort by gender then last name standard
                              [...activeClass.students].sort((a,b) => a.gender.localeCompare(b.gender) || a.lastName.localeCompare(b.lastName)).map((student, idx) => (
                                <tr key={student.id || idx} className="border-b border-slate-100 hover:bg-slate-50">
                                  <td className="p-4 text-slate-500">{idx + 1}</td>
                                  <td className="p-4 font-semibold text-slate-800">{student.lastName}, {student.firstName}</td>
                                  <td className="p-4"><span className={`px-2 py-1 text-xs font-bold rounded-md ${student.gender === 'Female' ? 'bg-pink-100 text-pink-700' : 'bg-blue-100 text-blue-700'}`}>{student.gender}</span></td>
                                  <td className="p-4 text-slate-600 font-mono text-sm">{student.lrn || 'N/A'}</td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* TAB: ATTENDANCE */}
                {activeTab === 'attendance' && (
                  <div className="space-y-6">
                    <div className="flex justify-between items-center flex-wrap gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                      <div className="flex items-center gap-3">
                        <label className="font-bold text-slate-700">Select Date:</label>
                        <input type="date" className="border border-slate-200 rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500" value={attDate} onChange={(e) => setAttDate(e.target.value)} max={getToday()} />
                      </div>
                      <button onClick={handleSaveAttendance} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-md transition-colors">Save Attendance</button>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="overflow-x-auto custom-scrollbar">
                        <table className="w-full text-left border-collapse">
                          <thead>
                            <tr className="bg-slate-50 border-b border-slate-200">
                              <th className="p-4 font-bold text-slate-600">Student Name</th>
                              <th className="p-4 font-bold text-slate-600 text-center">Status</th>
                            </tr>
                          </thead>
                          <tbody>
                            {(!activeClass.students || activeClass.students.length === 0) ? (
                              <tr><td colSpan="2" className="p-8 text-center text-slate-500 font-medium">Please enroll students first.</td></tr>
                            ) : (
                              [...activeClass.students].sort((a,b) => a.lastName.localeCompare(b.lastName)).map((s) => (
                                <tr key={s.id} className="border-b border-slate-100">
                                  <td className="p-4 font-semibold text-slate-800">{s.lastName}, {s.firstName} <span className="text-xs text-slate-400 ml-2">({s.gender})</span></td>
                                  <td className="p-4">
                                    <div className="flex justify-center gap-2">
                                      {['P', 'A'].map(status => (
                                        <button key={status} 
                                          onClick={() => setAttMap({...attMap, [s.id]: status})}
                                          className={`w-10 h-10 rounded-full font-bold text-sm transition-all ${attMap[s.id] === status ? (status === 'P' ? 'bg-emerald-500 text-white shadow-md shadow-emerald-500/30' : 'bg-red-500 text-white shadow-md shadow-red-500/30') : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}
                                        >
                                          {status}
                                        </button>
                                      ))}
                                    </div>
                                  </td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                      <div className="p-4 bg-slate-50 border-t border-slate-200 text-sm text-slate-500 flex justify-center gap-6">
                        <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-emerald-500"></div> Present</span>
                        <span className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-red-500"></div> Absent</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* TAB: REPORTS */}
                {activeTab === 'reports' && (
                  <div className="space-y-6">
                    <div className="flex items-center gap-3 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm w-max">
                      <label className="font-bold text-slate-700">Select Month:</label>
                      <input type="month" className="border border-slate-200 rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500" value={reportMonth} onChange={(e) => setReportMonth(e.target.value)} />
                    </div>

                    {!reportStats || reportStats.totalDays === 0 ? (
                       <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-12 text-center text-slate-500">No attendance records found for this month.</div>
                    ) : (
                      <>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                          <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm"><p className="text-sm text-slate-500 font-bold">Recorded Days</p><p className="text-2xl font-black text-slate-800">{reportStats.totalDays}</p></div>
                          <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-sm"><p className="text-sm text-blue-600 font-bold">Overall ADA</p><p className="text-2xl font-black text-blue-700">{reportStats.overall}%</p></div>
                          <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 shadow-sm"><p className="text-sm text-emerald-600 font-bold">Male ADA</p><p className="text-2xl font-black text-emerald-700">{reportStats.male}%</p></div>
                          <div className="bg-pink-50 p-4 rounded-2xl border border-pink-100 shadow-sm"><p className="text-sm text-pink-600 font-bold">Female ADA</p><p className="text-2xl font-black text-pink-700">{reportStats.female}%</p></div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                          <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse text-sm">
                              <thead>
                                <tr className="bg-slate-50 border-b border-slate-200">
                                  <th className="p-3 font-bold text-slate-600 sticky left-0 bg-slate-50 z-10 border-r border-slate-200">Student Name</th>
                                  {reportStats.dates.map(d => <th key={d} className="p-3 font-bold text-slate-600 text-center min-w-[40px] border-r border-slate-200">{d.split('-')[2]}</th>)}
                                  <th className="p-3 font-bold text-emerald-600 text-center border-r border-slate-200">P</th>
                                  <th className="p-3 font-bold text-red-600 text-center border-r border-slate-200">A</th>
                                  <th className="p-3 font-bold text-blue-600 text-center">%</th>
                                </tr>
                              </thead>
                              <tbody>
                                {[...activeClass.students].sort((a,b) => a.lastName.localeCompare(b.lastName)).map(s => {
                                  const stats = reportStats.statsByStudent[s.id];
                                  return (
                                  <tr key={s.id} className="border-b border-slate-100 hover:bg-slate-50">
                                    <td className="p-3 font-semibold text-slate-800 sticky left-0 bg-white border-r border-slate-200 whitespace-nowrap">{s.lastName}, {s.firstName}</td>
                                    {reportStats.dates.map(d => {
                                      const status = activeClass.attendance[d][s.id] || 'A';
                                      return <td key={d} className={`p-3 text-center font-bold border-r border-slate-100 ${status==='P' ? 'text-emerald-500':'text-red-400'}`}>{status}</td>
                                    })}
                                    <td className="p-3 text-center font-bold text-emerald-600 border-r border-slate-200 bg-emerald-50/30">{stats.present}</td>
                                    <td className="p-3 text-center font-bold text-red-600 border-r border-slate-200 bg-red-50/30">{stats.absent}</td>
                                    <td className="p-3 text-center font-bold text-blue-600 bg-blue-50/30">{stats.percent}%</td>
                                  </tr>
                                )})}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                )}
              </div>
            ) : (
              // --- CLASSES GRID VIEW ---
              <div className="animate-fade-in">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                  <div><h2 className="text-3xl font-bold text-slate-900">Your Classes</h2><p className="text-slate-500 mt-1 font-medium">Manage your sections and attendance.</p></div>
                  <button onClick={() => toggleModal('addClass', true)} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-semibold flex items-center gap-2 shadow-lg shadow-blue-600/20"><Icons.Plus /> Add Class</button>
                </div>

                {loading ? <div className="flex justify-center items-center h-64"><div className="loader"></div></div> : 
                 classes.length === 0 ? (
                  <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center">
                    <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-4"><Icons.Users /></div>
                    <h3 className="text-xl font-bold text-slate-800 mb-2">No Classes Yet</h3>
                    <p className="text-slate-500 mb-6 max-w-md">You haven't added any classes to your dashboard.</p>
                    <button onClick={() => toggleModal('addClass', true)} className="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-slate-800 transition-colors">Create First Class</button>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {classes.map(cls => (
                      <div key={cls.id} onClick={() => { setActiveClassId(cls.id); setActiveTab('students'); }} className="group bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:shadow-xl hover:border-blue-300 transition-all cursor-pointer flex flex-col h-full">
                        <div className="flex justify-between items-start mb-4">
                          <span className={`px-3 py-1 text-xs font-bold rounded-full ${cls.role === 'adviser' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700'}`}>{cls.role === 'adviser' ? 'Adviser' : 'Subject'}</span>
                          <button className="text-slate-400 group-hover:text-blue-500 transition-colors" onClick={(e) => e.stopPropagation()}><Icons.Settings /></button>
                        </div>
                        <h3 className="text-xl font-bold text-slate-900 mb-1 group-hover:text-blue-600 transition-colors">{cls.gradeLevel} - {cls.sectionName}</h3>
                        <p className="text-slate-600 text-sm font-medium mb-4 flex-1">{cls.role === 'subject' ? `Subject: ${cls.subject}` : 'Advisory Class'}</p>
                        <div className="pt-4 border-t border-slate-100 flex justify-between items-center text-slate-500 text-sm font-medium">
                          <div className="flex items-center gap-2"><Icons.Users /> <span>{cls.students ? cls.students.length : 0}</span></div>
                          <div className="flex items-center gap-2 text-blue-600 bg-blue-50 px-2 py-1 rounded-md">Manage <Icons.ArrowLeft /></div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </main>

          <AddClassModal isOpen={modals.addClass} onClose={() => toggleModal('addClass', false)} onAdd={handleAddClass} />
          <AddStudentModal isOpen={modals.addStudent} onClose={() => toggleModal('addStudent', false)} onAdd={handleAddStudent} />
          <BulkEnrollModal isOpen={modals.bulkEnroll} onClose={() => toggleModal('bulkEnroll', false)} onAddBulk={handleBulkEnroll} />
          <ImportClassModal isOpen={modals.importClass} onClose={() => toggleModal('importClass', false)} onImport={handleBulkEnroll} showToast={showToast} />
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(() => { const saved = localStorage.getItem('eduTrackUser'); return saved ? JSON.parse(saved) : null; });
      const [toast, setToast] = useState(null);

      const handleLogin = (userData) => { setUser(userData); localStorage.setItem('eduTrackUser', JSON.stringify(userData)); };
      const handleLogout = () => { setUser(null); localStorage.removeItem('eduTrackUser'); };
      const showToast = (message, type = 'success') => setToast({ message, type });

      return (
        <>
          {user ? <Dashboard user={user} onLogout={handleLogout} showToast={showToast} /> : <AuthScreen onLogin={handleLogin} showToast={showToast} />}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
